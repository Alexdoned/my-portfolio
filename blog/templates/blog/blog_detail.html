{% extends 'core/base.html' %}
{% block title %}{{ post.title }} | Portfolio{% endblock %}
{% block content %}
<div class="container">
    <article class="mb-4">
        <h1>{{ post.title }}</h1>
        <p class="text-muted">{{ post.created_at|date:'M d, Y' }} by {{ post.author }}</p>
        {% if post.featured_image %}
            <img src="{{ post.featured_image.url }}" class="img-fluid rounded mb-4" alt="{{ post.title }}">
        {% endif %}
        <div class="blog-content">{{ post.content|safe }}</div>
    </article>
</div>
{% endblock %}
